name: Acebook CICD workflow

on: 
  push: 
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 23
    
    - name: Install dependencies
      run: npm install

    - name: Start the server
      run: npm run start:test &

    - name: Wait for test server
      run: npx wait-on http://localhost:3030

    - name: Run tests
      run: npm test

#Deployment stage
  deploy:
    needs: build
  
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-2 
    
    - name: package app for deployment
      run: zip -r app.zip . -x "node_modules/*" ".git/*" ".github/*"
    
    - name: upload to S3
      run: aws s3 cp app.zip s3://abdirahman-acebook-bucket/app.zip --region eu-west-2

    - name: create deploy
      run: |
        aws deploy create-deployment \
          --application-name abdirahman-acebook-codedeploy-app \
          --deployment-group-name production-abdirahman \
          --description "acebook deployment 1" \
          --s3-location bucket=abdirahman-acebook-bucket,key=app.zip,bundleType=zip

